services:
  - type: web
    name: wsm-backend
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/status
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: NEWSDATA_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AISHUB_USERNAME
        sync: false
