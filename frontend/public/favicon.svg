<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="30" stroke="#06b6d4" stroke-width="2" fill="#0a0e17"/>
  <circle cx="32" cy="32" r="24" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <circle cx="32" cy="32" r="16" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2 2" opacity="0.3"/>
  <!-- Crosshair -->
  <line x1="32" y1="8" x2="32" y2="18" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
  <line x1="32" y1="46" x2="32" y2="56" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
  <line x1="8" y1="32" x2="18" y2="32" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
  <line x1="46" y1="32" x2="56" y2="32" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
