<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="50%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#0a0e17"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.08" stroke="#3b82f6" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Hotspot dots -->
  <circle cx="520" cy="280" r="8" fill="#ef4444" opacity="0.6"><animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="620" cy="310" r="6" fill="#f97316" opacity="0.5"><animate attributeName="r" values="6;10;6" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="680" cy="260" r="7" fill="#ef4444" opacity="0.5"><animate attributeName="r" values="7;11;7" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="450" cy="340" r="5" fill="#f59e0b" opacity="0.4"><animate attributeName="r" values="5;9;5" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="750" cy="290" r="6" fill="#ef4444" opacity="0.5"><animate attributeName="r" values="6;9;6" dur="2.2s" repeatCount="indefinite"/></circle>
  <!-- Globe icon -->
  <circle cx="600" cy="220" r="60" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <circle cx="600" cy="220" r="40" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.2"/>
  <ellipse cx="600" cy="220" rx="60" ry="25" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>
  <!-- Title -->
  <text x="600" y="360" font-family="Inter, sans-serif" font-size="64" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-2">World Situation Monitor</text>
  <!-- Subtitle -->
  <text x="600" y="410" font-family="Inter, sans-serif" font-size="24" font-weight="400" fill="#94a3b8" text-anchor="middle">Real-Time Geopolitical Intelligence Dashboard</text>
  <!-- Feature pills -->
  <g font-family="JetBrains Mono, monospace" font-size="13" fill="#3b82f6">
    <rect x="230" y="445" width="120" height="28" rx="14" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
    <text x="290" y="464" text-anchor="middle">CONFLICTS</text>
    <rect x="370" y="445" width="100" height="28" rx="14" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
    <text x="420" y="464" text-anchor="middle" fill="#ef4444">MISSILES</text>
    <rect x="490" y="445" width="100" height="28" rx="14" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
    <text x="540" y="464" text-anchor="middle" fill="#06b6d4">AIRCRAFT</text>
    <rect x="610" y="445" width="80" height="28" rx="14" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
    <text x="650" y="464" text-anchor="middle" fill="#22c55e">OSINT</text>
    <rect x="710" y="445" width="80" height="28" rx="14" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
    <text x="750" y="464" text-anchor="middle" fill="#a78bfa">AI INTEL</text>
    <rect x="810" y="445" width="100" height="28" rx="14" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
    <text x="860" y="464" text-anchor="middle" fill="#f59e0b">LIVE NEWS</text>
  </g>
  <!-- URL -->
  <text x="600" y="560" font-family="JetBrains Mono, monospace" font-size="16" fill="#64748b" text-anchor="middle">worldsituationmonitor.com</text>
  <!-- Top border accent -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>
</svg>
